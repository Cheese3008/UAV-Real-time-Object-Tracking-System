<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Select BBox</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: black;
      z-index: 1;
      cursor: crosshair;
    }

    #resetBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(220, 38, 38, 0.92);
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" autoplay playsinline muted></video>
    <button id="resetBtn">Reset</button>
  </div>

  <script>
    const video = document.getElementById("video");
    const resetBtn = document.getElementById("resetBtn");

    let pc = null;
    let latestState = null;
    let stateTimer = null;

    async function refreshState() {
      try {
        const resp = await fetch("/ai_state");
        if (!resp.ok) return;
        latestState = await resp.json();
      } catch (e) {
        console.error("refreshState error:", e);
      }
    }

    function getDisplayedVideoRect() {
      if (!latestState || !latestState.frame_width || !latestState.frame_height) {
        return null;
      }

      const rect = video.getBoundingClientRect();
      const frameW = latestState.frame_width;
      const frameH = latestState.frame_height;

      const scale = Math.min(rect.width / frameW, rect.height / frameH);
      const dispW = frameW * scale;
      const dispH = frameH * scale;
      const offsetX = (rect.width - dispW) / 2.0;
      const offsetY = (rect.height - dispH) / 2.0;

      return {
        left: rect.left + offsetX,
        top: rect.top + offsetY,
        width: dispW,
        height: dispH
      };
    }

    async function startWebRTC() {
      pc = new RTCPeerConnection();

      pc.ontrack = async (event) => {
        console.log("ontrack fired", event);

        if (event.streams && event.streams[0]) {
          video.srcObject = event.streams[0];
        } else {
          video.srcObject = new MediaStream([event.track]);
        }

        try {
          await video.play();
        } catch (e) {
          console.error("video.play error:", e);
        }
      };

      video.onloadedmetadata = () => {
        console.log("loadedmetadata", video.videoWidth, video.videoHeight);
      };

      video.onplaying = () => {
        console.log("video playing");
      };

      pc.onconnectionstatechange = () => {
        console.log("connectionState:", pc.connectionState);
      };

      pc.oniceconnectionstatechange = () => {
        console.log("iceConnectionState:", pc.iceConnectionState);
      };

      pc.addTransceiver("video", { direction: "recvonly" });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const resp = await fetch("/offer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type
        })
      });

      if (!resp.ok) {
        const txt = await resp.text();
        console.error("/offer failed:", txt);
        return;
      }

      const answer = await resp.json();
      await pc.setRemoteDescription(answer);

      await refreshState();
      if (stateTimer) clearInterval(stateTimer);
      stateTimer = setInterval(refreshState, 300);
    }

    video.addEventListener("click", async (e) => {
      const disp = getDisplayedVideoRect();
      if (!disp) {
        console.error("No video display rect");
        return;
      }

      try {
        const resp = await fetch("/select_bbox_click", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            click_x: e.clientX,
            click_y: e.clientY,
            disp_left: disp.left,
            disp_top: disp.top,
            disp_width: disp.width,
            disp_height: disp.height
          })
        });

        const result = await resp.json();
        console.log("select_bbox_click result:", result);
      } catch (e) {
        console.error("/select_bbox_click error:", e);
      }
    });

    resetBtn.addEventListener("click", async () => {
      try {
        await fetch("/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reset: true })
        });
      } catch (e) {
        console.error("/reset error:", e);
      }
    });

    window.onload = async () => {
      await startWebRTC();
    };
  </script>
</body>
</html>
